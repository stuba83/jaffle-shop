name: dbt-fabric pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  dbt:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ODBC Driver 18
        run: |
          curl -fsSL https://packages.microsoft.com/keys/microsoft.asc > /tmp/microsoft.asc
          sudo gpg --batch --yes --no-tty --dearmor -o /usr/share/keyrings/microsoft-prod.gpg /tmp/microsoft.asc
          curl -fsSL https://packages.microsoft.com/config/ubuntu/$(lsb_release -rs)/prod.list | sudo tee /etc/apt/sources.list.d/mssql-release.list
          sudo apt-get update
          sudo ACCEPT_EULA=Y apt-get install -y msodbcsql18 unixodbc-dev

      - name: Install dbt-fabric
        run: pip install dbt-fabric

      - name: Write profiles.yml
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml <<EOF
          default:
            target: fabric-ci
            outputs:
              fabric-ci:
                type: fabric
                driver: ODBC Driver 18 for SQL Server
                host: ${{ secrets.WAREHOUSE_HOST }}
                port: 1433
                database: ${{ secrets.WAREHOUSE_DB }}
                schema: dbo
                authentication: ServicePrincipal
                tenant_id: ${{ secrets.AZURE_TENANT_ID }}
                client_id: ${{ secrets.AZURE_CLIENT_ID }}
                client_secret: ${{ secrets.AZURE_CLIENT_SECRET }}
                threads: 4
                encrypt: true
                trust_cert: false
          EOF

      - name: dbt debug
        run: dbt debug
        working-directory: .

      - name: dbt seed
        run: dbt seed
        working-directory: .

      - name: dbt run
        run: dbt run
        working-directory: .

      - name: dbt test
        run: dbt test
        working-directory: .
